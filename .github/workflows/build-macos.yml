name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: make test

      - name: Build install packages
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION="0.0.0"
          fi
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          echo "Building app version ${APP_VERSION} (${BUILD_NUMBER})"
          APP_VERSION="${APP_VERSION}" BUILD_NUMBER="${BUILD_NUMBER}" make app

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simple-network-check-macos
          path: |
            dist/Simple Network Check.zip
            dist/Simple Network Check.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload release assets (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Simple Network Check.zip
            dist/Simple Network Check.dmg
